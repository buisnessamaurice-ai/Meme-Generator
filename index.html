<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=DM+Mono:wght@400;500&family=Impact&family=Comic+Neue:wght@700&family=Bebas+Neue&family=Pacifico&family=Anton&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>MEME GENERATOR</h1>
  <span>by you, powered by Canvas API</span>
</header>

<div class="app">

  <div class="panel">

    <div>
      <div class="section-title">01 — Image</div>
      <div class="upload-zone">
        <strong>Click to upload</strong>
        <p>or drag an image here</p>
        <input type="file" accept="image/*" onchange="handleUpload(this)" />
      </div>
    </div>

    <hr />

    <div>
      <div class="section-title">02 — Templates</div>
      <div class="templates" id="templates"></div>
    </div>

    <hr />

    <div>
      <div class="section-title">03 — Top text</div>
      <textarea id="topText" placeholder="TOP TEXT" rows="2" oninput="redraw()"></textarea>
    </div>

    <div>
      <div class="section-title">04 — Bottom text</div>
      <textarea id="bottomText" placeholder="BOTTOM TEXT" rows="2" oninput="redraw()"></textarea>
    </div>

    <hr />

    <div>
      <div class="section-title">05 — Style</div>

      <label>Font</label>
      <select id="fontFamily" onchange="redraw()">
        <option value="Oswald">Oswald</option>
        <option value="Impact">Impact</option>
        <option value="Anton">Anton</option>
        <option value="Bebas Neue">Bebas Neue</option>
        <option value="Pacifico">Pacifico</option>
        <option value="Comic Neue">Comic Neue</option>
      </select>
      <br />
      <label>Font size</label>
      <div class="slider-row">
        <input type="range" id="fontSize" min="16" max="140" value="52" step="1"
               oninput="document.getElementById('fontSizeVal').textContent=this.value; redraw()" />
        <span class="slider-val" id="fontSizeVal">52</span>
      </div>
      <br />
      <label>Alignment</label>
      <div class="align-group">
        <button class="align-btn active" id="align-left"   onclick="setAlign('left')">←</button>
        <button class="align-btn"        id="align-center" onclick="setAlign('center')">↔</button>
        <button class="align-btn"        id="align-right"  onclick="setAlign('right')">→</button>
      </div>
      <br />
      <label class="toggle-row" for="allCaps">
        <span>All caps</span>
        <input type="checkbox" id="allCaps" checked onchange="redraw()" />
      </label>

      <div class="sub-divider" onclick="toggleSub('colour')">
        Colour <span class="arrow">▲</span>
      </div>
      <div class="sub-body" id="sub-colour">
        <br />
        <div class="row">
          <div>
            <label>Text</label>
            <input type="color" id="textColor" value="#ffffff" oninput="redraw()" />
          </div>
          <div>
            <label>Outline</label>
            <input type="color" id="strokeColor" value="#000000" oninput="redraw()" />
          </div>
          <div>
            <label>Stroke width</label>
            <div class="slider-row">
              <input type="range" id="strokeWidth" min="0" max="14" value="4" step="1"
                     oninput="document.getElementById('strokeVal').textContent=this.value; redraw()" />
              <span class="slider-val" id="strokeVal">4</span>
            </div>
          </div>
        </div>
        <br />
        <label>Text opacity</label>
        <div class="slider-row">
          <input type="range" id="textOpacity" min="0" max="100" value="100" step="1"
                 oninput="document.getElementById('opacityVal').textContent=this.value+'%'; redraw()" />
          <span class="slider-val" id="opacityVal">100%</span>
        </div>
        <br />
      </div>

      <div class="sub-divider" onclick="toggleSub('shadow')">
        Shadow <span class="arrow">▲</span>
      </div>
      <div class="sub-body" id="sub-shadow">
        <br />
        <label class="toggle-row" for="shadowOn">
          <span>Enable shadow</span>
          <input type="checkbox" id="shadowOn" onchange="redraw()" />
        </label>
        <br />
        <div class="row">
          <div>
            <label>Shadow colour</label>
            <input type="color" id="shadowColor" value="#000000" oninput="redraw()" />
          </div>
          <div>
            <label>Blur</label>
            <div class="slider-row">
              <input type="range" id="shadowBlur" min="0" max="30" value="8" step="1"
                     oninput="document.getElementById('shadowBlurVal').textContent=this.value; redraw()" />
              <span class="slider-val" id="shadowBlurVal">8</span>
            </div>
          </div>
        </div>
        <br />
        <label>Shadow offset X</label>
        <div class="slider-row">
          <input type="range" id="shadowX" min="-20" max="20" value="3" step="1"
                 oninput="document.getElementById('shadowXVal').textContent=this.value; redraw()" />
          <span class="slider-val" id="shadowXVal">3</span>
        </div>
        <br />
        <label>Shadow offset Y</label>
        <div class="slider-row">
          <input type="range" id="shadowY" min="-20" max="20" value="3" step="1"
                 oninput="document.getElementById('shadowYVal').textContent=this.value; redraw()" />
          <span class="slider-val" id="shadowYVal">3</span>
        </div>
        <br />
      </div>

      <div class="sub-divider" onclick="toggleSub('position')">
        Position <span class="arrow">▲</span>
      </div>
      <div class="sub-body" id="sub-position">
        <br />
        <label>Top text — vertical</label>
        <div class="slider-row">
          <input type="range" id="topY" min="0" max="100" value="8" step="1"
                 oninput="document.getElementById('topYVal').textContent=this.value+'%'; redraw()" />
          <span class="slider-val" id="topYVal">8%</span>
        </div>
        <br />
        <label>Bottom text — vertical</label>
        <div class="slider-row">
          <input type="range" id="bottomY" min="0" max="100" value="92" step="1"
                 oninput="document.getElementById('bottomYVal').textContent=this.value+'%'; redraw()" />
          <span class="slider-val" id="bottomYVal">92%</span>
        </div>
        <br />
        <label>Horizontal (both)</label>
        <div class="slider-row">
          <input type="range" id="textX" min="0" max="100" value="50" step="1"
                 oninput="document.getElementById('textXVal').textContent=this.value+'%'; redraw()" />
          <span class="slider-val" id="textXVal">50%</span>
        </div>
        <br />
      </div>

    </div>

    <hr />

    <div>
      <div class="section-title">06 — Export</div>
      <div class="download-row">
        <button class="primary" onclick="downloadMeme('png')">Download PNG</button>
        <button onclick="downloadMeme('jpeg')">JPG</button>
        <button id="copyBtn" onclick="copyToClipboard()">Copy image</button>
      </div>
    </div>

  </div>

  <div class="canvas-area">
    <canvas id="meme-canvas" width="500" height="500"></canvas>
    <p class="canvas-hint">Choose a template or upload an image to get started</p>
  </div>

</div>

<!-- Script loaded at the bottom so all HTML elements exist before JS tries to find them -->
<script src="js/script.js"></script>

</body>
</html>
